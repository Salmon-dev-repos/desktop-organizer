<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src data: file:; style-src 'unsafe-inline' file:; script-src 'self' file:; font-src 'self' file:;" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/card.css" />
  <link rel="stylesheet" href="todo.css" />
</head>
<body class="theme-dark">
  <div id="card" class="card">
    <header id="header" class="header">
      <button id="chev" class="chev" title="Collapse / expand" tabindex="-1">
        <svg viewBox="0 0 16 16" width="14" height="14"><path d="M5 3l6 5-6 5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="title-wrap">
        <span id="title" class="title">To-Do</span>
        <input id="title-input" class="title-input" type="text" spellcheck="false" hidden />
      </div>
      <span class="drag-space"></span>
      <span id="badge" class="badge" hidden></span>
      <button id="settings-btn" class="icon-btn" title="App settings" tabindex="-1">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="menu-btn" class="icon-btn" title="List menu" tabindex="-1">
        <svg viewBox="0 0 16 16" width="16" height="16"><circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/></svg>
      </button>
    </header>

    <div id="progress" class="progress"><span id="progress-fill" class="progress-fill"></span></div>

    <div id="body" class="body">
      <!-- quick add -->
      <div class="quickadd">
        <div class="qa-input-wrap">
          <button id="qa-add" class="qa-plus" title="Add task" tabindex="-1">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 3v10M3 8h10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <input id="qa" class="qa" type="text" spellcheck="false"
                 placeholder='Add a task…  try "pay rent fri 5pm !high #home"' />
        </div>
        <div id="qa-preview" class="qa-preview" hidden></div>
      </div>

      <!-- filter bar -->
      <div class="filters">
        <div class="fchips" id="fchips">
          <button class="fchip" data-filter="all">All</button>
          <button class="fchip" data-filter="active">Active</button>
          <button class="fchip" data-filter="completed">Done</button>
        </div>
        <button id="sort-btn" class="sort-btn" title="Sort">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h8M5 8h6M6 11h4"/></svg>
          <span id="sort-label">Manual</span>
        </button>
      </div>

      <ul id="list" class="tlist"></ul>

      <div id="completed-group" class="completed-group" hidden>
        <button id="completed-toggle" class="completed-toggle">
          <svg class="cg-chev" viewBox="0 0 16 16" width="12" height="12"><path d="M5 3l6 5-6 5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="completed-label">Completed</span>
        </button>
        <ul id="completed-list" class="tlist completed"></ul>
      </div>

      <div id="empty" class="empty" hidden>
        <div class="big">✨</div>
        <div id="empty-msg">All clear — add your first task</div>
      </div>
    </div>
  </div>

  <div class="rh n"></div><div class="rh s"></div><div class="rh e"></div><div class="rh w"></div>
  <div class="rh ne"></div><div class="rh nw"></div><div class="rh se"></div><div class="rh sw"></div>

  <script src="todo.js"></script>
</body>
</html>
